<style>
  :root{
    --bg:#F6F5F2; --surface:#FFFFFF; --ink:#1C1B19; --muted:#76726B;
    --hair:#E7E4DE; --hair-strong:#D8D4CC;
    --accent:#2E6E5B; --accent-soft:#DCEAE3; --accent-ink:#1F4E40;
    --amber:#C8862B; --amber-soft:#F3E6CF;
    --danger:#A8503C;
    --shadow:0 1px 2px rgba(28,27,25,.04), 0 8px 24px rgba(28,27,25,.05);
    --radius:16px;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,"Segoe UI",Roboto,sans-serif;
    --anim:300ms;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#16181A; --surface:#1F2225; --ink:#ECEAE4; --muted:#9A968E;
      --hair:#2C2F33; --hair-strong:#3A3E43;
      --accent:#4FB596; --accent-soft:#1E342D; --accent-ink:#9FD8C7;
      --amber:#E0A23E; --amber-soft:#3A301C;
      --danger:#D98162;
      --shadow:0 1px 2px rgba(0,0,0,.2), 0 10px 30px rgba(0,0,0,.28);
    }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    font-family:var(--sans); color:var(--ink); background:var(--bg);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    line-height:1.45;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    min-height:100vh; min-height:100dvh;
  }
  .wrap{max-width:560px; margin:0 auto; padding:0 18px 40px}

  /* Header */
  header{padding:26px 2px 14px}
  .eyebrow{
    font-family:var(--mono); font-size:12px; letter-spacing:.06em;
    text-transform:uppercase; color:var(--muted); margin:0 0 4px;
  }
  h1{font-size:30px; line-height:1.05; letter-spacing:-.02em; font-weight:760; margin:0}
  .progress{margin-top:16px}
  .progress-track{height:8px; border-radius:99px; background:var(--hair); overflow:hidden}
  .progress-fill{
    height:100%; width:0%; border-radius:99px;
    background:linear-gradient(90deg,var(--accent),var(--accent));
    transition:width 420ms cubic-bezier(.2,.8,.2,1);
  }
  .progress-meta{
    display:flex; justify-content:space-between; align-items:baseline;
    margin-top:8px; font-family:var(--mono); font-size:12.5px; color:var(--muted);
  }
  .progress-meta b{color:var(--ink); font-weight:600}

  /* Composer */
  .composer{
    display:flex; gap:10px; align-items:center;
    background:var(--surface); border:1px solid var(--hair);
    border-radius:var(--radius); padding:8px 8px 8px 16px; box-shadow:var(--shadow);
    margin:6px 0 14px;
  }
  .composer input{
    flex:1; border:0; outline:0; background:transparent; color:var(--ink);
    font-family:var(--sans); font-size:16px; padding:8px 0;
  }
  .composer input::placeholder{color:var(--muted)}
  .add{
    flex:none; width:40px; height:40px; border:0; border-radius:12px;
    background:var(--accent); color:#fff; cursor:pointer;
    display:grid; place-items:center; transition:transform 120ms ease, opacity 120ms ease;
  }
  .add:active{transform:scale(.92)}
  .add:disabled{opacity:.35; cursor:default}
  .add svg{width:20px; height:20px}

  /* Filter segmented control */
  .filters{
    display:flex; gap:2px; padding:3px; border-radius:12px;
    background:var(--hair); margin:0 0 12px;
  }
  .filters button{
    flex:1; border:0; background:transparent; cursor:pointer;
    font-family:var(--sans); font-size:13.5px; font-weight:560; color:var(--muted);
    padding:8px 6px; border-radius:9px; transition:background 160ms ease, color 160ms ease;
  }
  .filters button[aria-selected="true"]{background:var(--surface); color:var(--ink); box-shadow:var(--shadow)}

  /* List */
  ul{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:8px}
  li.task{
    display:flex; align-items:center; gap:12px;
    background:var(--surface); border:1px solid var(--hair);
    border-radius:14px; padding:12px 12px 12px 14px; box-shadow:var(--shadow);
    animation:rise 240ms cubic-bezier(.2,.8,.2,1);
  }
  @keyframes rise{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none}}
  li.removing{animation:fall 240ms ease forwards}
  @keyframes fall{to{opacity:0; transform:translateY(-4px); height:0; padding-top:0; padding-bottom:0; margin-top:-8px}}

  /* Checkbox */
  .check{
    flex:none; width:26px; height:26px; border-radius:50%;
    border:2px solid var(--hair-strong); background:transparent; cursor:pointer;
    display:grid; place-items:center; transition:border-color var(--anim) ease, background var(--anim) ease;
  }
  .check svg{width:15px; height:15px}
  .check path{
    stroke:#fff; stroke-width:2.6; stroke-linecap:round; stroke-linejoin:round; fill:none;
    stroke-dasharray:22; stroke-dashoffset:22; transition:stroke-dashoffset var(--anim) ease;
  }
  li.done .check{background:var(--accent); border-color:var(--accent)}
  li.done .check path{stroke-dashoffset:0}

  /* Text */
  .text{
    flex:1; min-width:0; font-size:16px; color:var(--ink); cursor:text;
    position:relative; word-break:break-word; padding:1px 0;
    transition:color var(--anim) ease;
  }
  .text::after{
    content:""; position:absolute; left:0; top:50%; height:1.5px; width:0;
    background:var(--muted); transition:width var(--anim) cubic-bezier(.2,.8,.2,1);
  }
  li.done .text{color:var(--muted)}
  li.done .text::after{width:100%}
  .text-edit{
    flex:1; min-width:0; font-family:var(--sans); font-size:16px; color:var(--ink);
    border:0; outline:0; background:transparent; padding:1px 0;
    border-bottom:1.5px solid var(--accent);
  }

  /* Row icon buttons */
  .iconbtn{
    flex:none; width:32px; height:32px; border:0; background:transparent; cursor:pointer;
    border-radius:9px; display:grid; place-items:center; color:var(--muted);
    transition:color 140ms ease, background 140ms ease, transform 120ms ease;
  }
  .iconbtn:active{transform:scale(.88)}
  .iconbtn:hover{background:var(--hair)}
  .iconbtn svg{width:18px; height:18px}
  .star.on{color:var(--amber)}
  .star.on svg{fill:var(--amber)}
  .del:hover{color:var(--danger)}
  li.important{border-color:var(--amber); box-shadow:0 0 0 1px var(--amber) inset, var(--shadow)}

  /* Empty state */
  .empty{
    text-align:center; padding:48px 24px; color:var(--muted);
    border:1px dashed var(--hair-strong); border-radius:var(--radius); margin-top:6px;
  }
  .empty .mark{font-size:26px; margin-bottom:8px}
  .empty p{margin:0; font-size:15px}

  /* Footer toolbar */
  footer{display:flex; gap:8px; margin-top:18px; flex-wrap:wrap}
  .tool{
    border:1px solid var(--hair); background:var(--surface); color:var(--ink);
    font-family:var(--sans); font-size:13.5px; font-weight:540; cursor:pointer;
    padding:9px 14px; border-radius:11px; transition:background 140ms ease, border-color 140ms ease;
  }
  .tool:hover{background:var(--hair)}
  .tool.ghost{color:var(--muted)}
  .spacer{flex:1}

  /* Toast */
  .toast{
    position:fixed; left:50%; transform:translateX(-50%) translateY(20px);
    bottom:calc(20px + env(safe-area-inset-bottom));
    background:var(--ink); color:var(--bg); border-radius:12px;
    padding:11px 14px; display:flex; align-items:center; gap:14px;
    font-size:14px; box-shadow:0 10px 30px rgba(0,0,0,.25); z-index:50;
    opacity:0; pointer-events:none; transition:opacity 200ms ease, transform 200ms ease;
    max-width:calc(100% - 36px);
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto}
  .toast button{
    border:0; background:transparent; color:var(--accent); font-family:var(--sans);
    font-weight:680; font-size:14px; cursor:pointer; padding:0;
  }
  @media (prefers-color-scheme: dark){ .toast button{color:var(--accent-ink)} }

  :focus-visible{outline:2px solid var(--accent); outline-offset:2px; border-radius:6px}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important; transition-duration:.001ms !important}
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <p class="eyebrow" id="dateLabel"></p>
      <h1>Today</h1>
      <div class="progress">
        <div class="progress-track"><div class="progress-fill" id="bar"></div></div>
        <div class="progress-meta">
          <span id="count"><b>0</b> of 0 done</span>
          <span id="leftLabel"></span>
        </div>
      </div>
    </header>

    <div class="composer">
      <input id="input" type="text" placeholder="Add a task" autocomplete="off"
             autocapitalize="sentences" enterkeyhint="done" aria-label="New task">
      <button class="add" id="addBtn" aria-label="Add task" disabled>
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="filters" role="tablist" aria-label="Filter tasks">
      <button role="tab" data-filter="all" aria-selected="true">All</button>
      <button role="tab" data-filter="active" aria-selected="false">Active</button>
      <button role="tab" data-filter="done" aria-selected="false">Done</button>
    </div>

    <ul id="list"></ul>
    <div class="empty" id="empty" hidden><div class="mark">◍</div><p id="emptyMsg"></p></div>

    <footer>
      <button class="tool" id="exportBtn">Export backup</button>
      <button class="tool" id="importBtn">Import</button>
      <span class="spacer"></span>
      <button class="tool ghost" id="clearBtn" hidden>Clear done</button>
    </footer>
    <input type="file" id="file" accept="application/json,.json" hidden>
  </div>

  <div class="toast" id="toast"><span id="toastMsg"></span><button id="toastAction" hidden></button></div>

<script>
(function(){
  "use strict";
  var KEY = "tend.tasks.v1";
  var state = { tasks: [], filter: "all" };

  // ---- persistence ----
  function load(){
    try{
      var raw = localStorage.getItem(KEY);
      if(raw){ var d = JSON.parse(raw); if(Array.isArray(d)) state.tasks = d; }
    }catch(e){ /* corrupt storage: start clean */ }
  }
  function save(){
    try{ localStorage.setItem(KEY, JSON.stringify(state.tasks)); }
    catch(e){ toast("Couldn't save — device storage may be full"); }
  }

  // ---- helpers ----
  var $ = function(id){ return document.getElementById(id); };
  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  function esc(s){ return s.replace(/[&<>"']/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]; }); }
  var ANIM = matchMedia("(prefers-reduced-motion: reduce)").matches ? 0 : 320;

  function sorted(){
    return state.tasks.slice().sort(function(a,b){
      if(a.done !== b.done) return a.done ? 1 : -1;        // done sinks
      if(!a.done && a.important !== b.important) return a.important ? -1 : 1; // important rises
      return b.created - a.created;                         // newest first
    });
  }
  function visible(t){
    return state.filter === "all" || (state.filter === "active" ? !t.done : t.done);
  }

  // ---- rendering ----
  var list = $("list");
  function makeRow(t){
    var li = document.createElement("li");
    li.className = "task" + (t.done ? " done" : "") + (t.important && !t.done ? " important" : "");
    li.dataset.id = t.id;
    li.innerHTML =
      '<button class="check" aria-label="Toggle complete" aria-pressed="'+(t.done?"true":"false")+'">'+
        '<svg viewBox="0 0 24 24"><path d="M5 12.5l4.2 4.2L19 7"/></svg></button>'+
      '<span class="text">'+esc(t.text)+'</span>'+
      '<button class="iconbtn star'+(t.important?" on":"")+'" aria-label="Mark important" aria-pressed="'+(t.important?"true":"false")+'">'+
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3.5l2.6 5.3 5.9.9-4.3 4.1 1 5.8L12 17l-5.2 2.6 1-5.8-4.3-4.1 5.9-.9z" stroke-linejoin="round"/></svg></button>'+
      '<button class="iconbtn del" aria-label="Delete task">'+
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 6l12 12M18 6L6 18" stroke-linecap="round"/></svg></button>';
    return li;
  }

  function render(){
    var rows = sorted().filter(visible);
    list.innerHTML = "";
    rows.forEach(function(t){ list.appendChild(makeRow(t)); });
    updateMeta();

    var anyTasks = state.tasks.length > 0;
    var emptyEl = $("empty");
    if(rows.length === 0){
      emptyEl.hidden = false;
      $("emptyMsg").textContent = !anyTasks ? "Nothing here yet. Add your first task above."
        : state.filter === "active" ? "All clear. Nothing left to do."
        : "No completed tasks yet.";
    } else { emptyEl.hidden = true; }

    $("clearBtn").hidden = !state.tasks.some(function(t){ return t.done; });
  }

  function updateMeta(){
    var total = state.tasks.length;
    var done = state.tasks.filter(function(t){ return t.done; }).length;
    var pct = total ? Math.round(done/total*100) : 0;
    $("bar").style.width = pct + "%";
    $("count").innerHTML = "<b>"+done+"</b> of "+total+" done";
    var left = total - done;
    $("leftLabel").textContent = total === 0 ? "" : (left === 0 ? "✓ done" : left + " left");
  }

  // ---- actions ----
  function add(text){
    text = text.trim(); if(!text) return;
    state.tasks.push({ id:uid(), text:text, done:false, important:false, created:Date.now() });
    save(); render();
  }
  function find(id){ for(var i=0;i<state.tasks.length;i++) if(state.tasks[i].id===id) return state.tasks[i]; }

  function toggle(id, li){
    var t = find(id); if(!t) return;
    t.done = !t.done; save();
    li.classList.toggle("done", t.done);
    li.querySelector(".check").setAttribute("aria-pressed", t.done?"true":"false");
    li.classList.toggle("important", t.important && !t.done);
    updateMeta();
    $("clearBtn").hidden = !state.tasks.some(function(x){ return x.done; });
    if(state.filter !== "all") setTimeout(render, ANIM);   // let the check animate, then refilter
  }

  function star(id){
    var t = find(id); if(!t) return;
    t.important = !t.important; save(); render();
  }

  function remove(id){
    var idx = -1; for(var i=0;i<state.tasks.length;i++) if(state.tasks[i].id===id) idx=i;
    if(idx<0) return;
    var removed = state.tasks.splice(idx,1)[0];
    save();
    var li = list.querySelector('li[data-id="'+id+'"]');
    if(li){ li.classList.add("removing"); setTimeout(render, ANIM); } else { render(); }
    toast("Task deleted", "Undo", function(){
      state.tasks.push(removed); save(); render();
    });
  }

  function startEdit(id, span){
    var t = find(id); if(!t) return;
    var input = document.createElement("input");
    input.className = "text-edit"; input.value = t.text; input.setAttribute("aria-label","Edit task");
    span.replaceWith(input); input.focus();
    input.setSelectionRange(input.value.length, input.value.length);
    var done = false;
    function commit(){
      if(done) return; done = true;
      var v = input.value.trim();
      if(v){ t.text = v; save(); }
      render();
    }
    input.addEventListener("blur", commit);
    input.addEventListener("keydown", function(e){
      if(e.key==="Enter"){ e.preventDefault(); commit(); }
      else if(e.key==="Escape"){ done = true; render(); }
    });
  }

  // ---- list event delegation ----
  list.addEventListener("click", function(e){
    var li = e.target.closest("li.task"); if(!li) return;
    var id = li.dataset.id;
    if(e.target.closest(".check")) return toggle(id, li);
    if(e.target.closest(".star")) return star(id);
    if(e.target.closest(".del")) return remove(id);
    if(e.target.classList.contains("text")) return startEdit(id, e.target);
  });

  // ---- composer ----
  var input = $("input"), addBtn = $("addBtn");
  function syncAdd(){ addBtn.disabled = input.value.trim() === ""; }
  input.addEventListener("input", syncAdd);
  input.addEventListener("keydown", function(e){
    if(e.key==="Enter"){ e.preventDefault(); if(input.value.trim()){ add(input.value); input.value=""; syncAdd(); } }
  });
  addBtn.addEventListener("click", function(){
    if(input.value.trim()){ add(input.value); input.value=""; syncAdd(); input.focus(); }
  });

  // ---- filters ----
  Array.prototype.forEach.call(document.querySelectorAll(".filters button"), function(b){
    b.addEventListener("click", function(){
      state.filter = b.dataset.filter;
      document.querySelectorAll(".filters button").forEach(function(x){
        x.setAttribute("aria-selected", x===b ? "true":"false");
      });
      render();
    });
  });

  // ---- clear done ----
  $("clearBtn").addEventListener("click", function(){
    var cleared = state.tasks.filter(function(t){ return t.done; });
    if(cleared.length === 0) return;
    state.tasks = state.tasks.filter(function(t){ return !t.done; });
    save(); render();
    toast(cleared.length + " cleared", "Undo", function(){
      state.tasks = state.tasks.concat(cleared); save(); render();
    });
  });

  // ---- export / import ----
  $("exportBtn").addEventListener("click", function(){
    var blob = new Blob([JSON.stringify(state.tasks, null, 2)], {type:"application/json"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    var d = new Date(), p = function(n){ return (n<10?"0":"")+n; };
    a.href = url; a.download = "tend-backup-"+d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+".json";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
    toast("Backup downloaded");
  });
  $("importBtn").addEventListener("click", function(){ $("file").click(); });
  $("file").addEventListener("change", function(e){
    var f = e.target.files[0]; if(!f) return;
    var reader = new FileReader();
    reader.onload = function(){
      try{
        var data = JSON.parse(reader.result);
        if(!Array.isArray(data)) throw 0;
        var clean = data.filter(function(t){ return t && typeof t.text === "string"; })
          .map(function(t){ return {
            id: t.id || uid(), text: String(t.text),
            done: !!t.done, important: !!t.important,
            created: typeof t.created === "number" ? t.created : Date.now()
          }; });
        if(!confirm("Replace your current "+state.tasks.length+" task(s) with "+clean.length+" from this file?")) return;
        state.tasks = clean; save(); render();
        toast("Imported "+clean.length+" task(s)");
      }catch(err){ toast("That file isn't a valid Tend backup"); }
    };
    reader.readAsText(f);
    e.target.value = "";
  });

  // ---- toast ----
  var toastTimer;
  function toast(msg, actionLabel, fn){
    var el = $("toast"), btn = $("toastAction");
    $("toastMsg").textContent = msg;
    if(actionLabel){ btn.hidden=false; btn.textContent=actionLabel;
      btn.onclick = function(){ hide(); fn && fn(); }; }
    else btn.hidden = true;
    el.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(hide, actionLabel ? 5000 : 2400);
    function hide(){ el.classList.remove("show"); }
  }

  // ---- date label ----
  (function(){
    var d = new Date();
    $("dateLabel").textContent = d.toLocaleDateString(undefined,
      { weekday:"long", month:"long", day:"numeric" });
  })();

  // ---- init ----
  load(); render(); syncAdd();
})();
</script>
</body>
</html>
